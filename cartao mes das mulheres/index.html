<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homenagem - Mês da Mulher</title>
    <link rel="stylesheet" href="css.css">
    <!-- Script do Confete (Carregado antes para o JS encontrar) -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- Font Awesome corrigido -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
</head>
<body>

<main class="card">
    <header class="header-img">
        <h2>Feliz Dia/Mês da Mulher!</h2>
    </header>

    <section class="content">
        <p class="intro-text">Homenagem à força e ao talento de todas as mulheres.</p>

        <div class="quote-box">
            <p id="quoteText">"Onde há uma mulher, há magia e revolução."</p>
        </div>

        <!-- Corrigido: id="btnCelebrate" -->
        <button class="btn-celebrate" id="btnCelebrate">Comemorar! 🎉</button>

        <div class="video-container">
            <video autoplay muted loop playsinline class="video-player">
                <!-- Substitua 'seu-video.mp4' pelo nome exato do seu arquivo -->
                <source src="cartaodiadasmulheres.mp4" type="video/mp4">
            </video>
        </div>

<script src="javascript.js"></script>
</body>
</html>
